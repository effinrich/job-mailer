name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest

        # Least-privilege: only what's needed to check out the repo.
        # Copilot gets its own token for everything else.
        permissions:
            contents: read

        timeout-minutes: 10

        steps:
            # Checkout gives Copilot a clean working copy to start from.
            # Add dependency-install steps here as the project grows.
            - name: Checkout code
              uses: actions/checkout@v4
